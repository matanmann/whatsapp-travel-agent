<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Travel Agent Dev Simulator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 2rem auto;
        max-width: 760px;
        padding: 0 1rem;
      }
      textarea {
        width: 100%;
        min-height: 80px;
      }
      .out {
        margin-top: 1rem;
        white-space: pre-wrap;
        background: #f5f5f5;
        padding: 0.8rem;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Travel Agent Dev Simulator</h1>
    <p>Send a local message to <code>/api/dev/simulate</code>.</p>
    <textarea id="msg" placeholder="Plan a 2-week trip to Thailand in November"></textarea>
    <br /><br />
    <button id="send">Send</button>
    <div class="out" id="out">No response yet.</div>

    <script>
      const out = document.getElementById('out');
      document.getElementById('send').addEventListener('click', async () => {
        const body = document.getElementById('msg').value;
        const response = await fetch('/api/dev/simulate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body }),
        });
        const data = await response.json();
        out.textContent = response.ok ? data.response : JSON.stringify(data);
      });
    </script>
  </body>
</html>
